{% extends "base.html" %}
{% load static %}

{% block title %}Ajouter une question{% endblock %}

{% block header %}
<div class="text-center mb-4">
    <h1 class="mb-3">Ajouter une question</h1>
    <img src="{% static 'polls/images/header.png' %}"
         class="img-fluid rounded shadow-sm"
         alt="Header image">
</div>
{% endblock %}

{% block main %}

<div class="row justify-content-center">
    <div class="col-lg-8">

        <div class="card shadow">
            <div class="card-body p-4">

                <form action="{% url 'polls:add_question' %}" method="post">
                    {% csrf_token %}

                    <!-- Question -->
                    <div class="mb-4">
                        <label for="question_text" class="form-label">
                            Question
                        </label>
                        <input type="text"
                               class="form-control"
                               id="question_text"
                               name="question_text"
                               required>
                    </div>

                    <hr>

                    <h5 class="mb-3">Choix</h5>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Choice 1</label>
                            <input type="text" class="form-control" name="choice_text0">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Choice 2</label>
                            <input type="text" class="form-control" name="choice_text1">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Choice 3</label>
                            <input type="text" class="form-control" name="choice_text2">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Choice 4</label>
                            <input type="text" class="form-control" name="choice_text3">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Choice 5</label>
                            <input type="text" class="form-control" name="choice_text4">
                        </div>
                    </div>

                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-success">
                            Ajouter la question
                        </button>
                    </div>

                </form>

            </div>
        </div>

    </div>
</div>

{% endblock %}
