{% extends "base.html" %}
{% load django_bootstrap5 %}

{% block title %}Ajouter une question{% endblock %}

{% block header %}
<h1 class="mb-4">Ajouter une question</h1>
{% endblock %}

{% block main %}
<div class="row justify-content-center">
    <div class="col-lg-8">

        <div class="card shadow">
            <div class="card-body p-4">

                <form action="{% url 'polls:add_question2' %}" method="post" novalidate>
                    {% csrf_token %}

                    {% bootstrap_form form %}

                    <div class="d-grid mt-3">
                        <button type="submit" class="btn btn-success">
                            Submit
                        </button>
                    </div>
                </form>

            </div>
        </div>

    </div>
</div>
{% endblock %}
